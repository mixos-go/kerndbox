# kerndbox — docker-compose.yml
#
# UML CANNOT be cross-compiled. Use the correct profile for your host:
#
#   On arm64 host:
#     docker compose --profile arm64 run --rm build-arm64
#     docker compose --profile arm64 run --rm test-arm64
#     docker compose --profile arm64 run --rm dev-arm64
#
#   On x86_64 host:
#     docker compose --profile x86 run --rm build-x86
#     docker compose --profile x86 run --rm test-x86
#     docker compose --profile x86 run --rm dev-x86
#
# Prerequisites on HOST (for boot test):
#   sudo sysctl -w kernel.yama.ptrace_scope=0

# ── Shared config blocks ─────────────────────────────────────────────────────
x-common-arm64: &common-arm64
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/arm64
  image: kerndbox:arm64
  platform: linux/arm64
  privileged: true
  security_opt:
    - seccomp:unconfined
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

x-common-x86: &common-x86
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
  image: kerndbox:x86
  platform: linux/amd64
  privileged: true
  security_opt:
    - seccomp:unconfined
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

# /dev/shm must be exec for UML. Docker mounts it noexec by default.
# Override with an exec tmpfs. Size 512m matches UML mem= in run-test.sh.
x-shm-exec: &shm-exec
  tmpfs:
    - /dev/shm:exec,size=512m

services:

  # ── arm64 ─────────────────────────────────────────────────────────────────
  build-arm64:
    <<: *common-arm64
    profiles: [arm64]
    command: build

  test-arm64:
    <<: *common-arm64
    <<: *shm-exec
    profiles: [arm64]
    command: test

  dev-arm64:
    <<: *common-arm64
    <<: *shm-exec
    profiles: [arm64]
    stdin_open: true
    tty: true
    command: bash

  rootfs-arm64:
    <<: *common-arm64
    profiles: [arm64]
    command: rootfs

  # ── x86_64 ────────────────────────────────────────────────────────────────
  build-x86:
    <<: *common-x86
    profiles: [x86]
    command: build

  test-x86:
    <<: *common-x86
    <<: *shm-exec
    profiles: [x86]
    command: test

  dev-x86:
    <<: *common-x86
    <<: *shm-exec
    profiles: [x86]
    stdin_open: true
    tty: true
    command: bash

  rootfs-x86:
    <<: *common-x86
    profiles: [x86]
    command: rootfs

volumes:
  kerndbox-cache:
    name: kerndbox-cache
