# kerndbox — docker-compose.yml
#
#   On arm64 host:  docker compose --profile arm64 run --rm {service}-arm64
#   On x86_64 host: docker compose --profile x86   run --rm {service}-x86
#
# Prerequisites on HOST (for boot test):
#   sudo sysctl -w kernel.yama.ptrace_scope=0

x-base: &base
  privileged: true
  security_opt:
    - seccomp:unconfined
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

# UML needs /dev/shm exec — docker mounts it noexec by default
# Only test + dev services need this (build/rootfs don't launch UML)
x-shm: &shm
  privileged: true
  security_opt:
    - seccomp:unconfined
  tmpfs:
    - /dev/shm:exec,size=512m
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

services:

  # ── arm64 ─────────────────────────────────────────────────────────────────
  build-arm64:
    <<: *base
    profiles: [arm64]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:arm64
    platform: linux/arm64
    command: build

  rootfs-arm64:
    <<: *base
    profiles: [arm64]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:arm64
    platform: linux/arm64
    command: rootfs

  test-arm64:
    <<: *shm
    profiles: [arm64]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:arm64
    platform: linux/arm64
    command: test

  dev-arm64:
    <<: *shm
    profiles: [arm64]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:arm64
    platform: linux/arm64
    stdin_open: true
    tty: true
    command: bash

  # ── x86_64 ────────────────────────────────────────────────────────────────
  build-x86:
    <<: *base
    profiles: [x86]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:x86
    platform: linux/amd64
    command: build

  rootfs-x86:
    <<: *base
    profiles: [x86]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:x86
    platform: linux/amd64
    command: rootfs

  test-x86:
    <<: *shm
    profiles: [x86]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:x86
    platform: linux/amd64
    command: test

  dev-x86:
    <<: *shm
    profiles: [x86]
    build:
      context: .
      dockerfile: Dockerfile
    image: kerndbox:x86
    platform: linux/amd64
    stdin_open: true
    tty: true
    command: bash

volumes:
  kerndbox-cache:
    name: kerndbox-cache
