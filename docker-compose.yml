# kerndbox — docker-compose.yml
#
#   On arm64 host:  docker compose --profile arm64 run --rm {service}-arm64
#   On x86_64 host: docker compose --profile x86   run --rm {service}-x86
#
# Setup (sekali):
#   make pull        — pull image dari ghcr.io
#
# Update image:
#   make image-clean && make pull

x-env: &env
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

x-vols: &vols
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace

x-sec: &sec
  privileged: true
  security_opt:
    - seccomp:unconfined

services:

  # ── arm64 ─────────────────────────────────────────────────────────────────
  build-arm64:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:arm64}
    platform: linux/arm64
    profiles: [arm64]
    pull_policy: never
    command: build

  rootfs-arm64:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:arm64}
    platform: linux/arm64
    profiles: [arm64]
    pull_policy: never
    command: rootfs

  test-arm64:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:arm64}
    platform: linux/arm64
    profiles: [arm64]
    pull_policy: never
    tmpfs:
      - /dev/shm:exec,size=512m
    command: test

  dev-arm64:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:arm64}
    platform: linux/arm64
    profiles: [arm64]
    pull_policy: never
    tmpfs:
      - /dev/shm:exec,size=512m
    stdin_open: true
    tty: true
    command: bash

  # ── x86_64 ────────────────────────────────────────────────────────────────
  build-x86:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:x86}
    platform: linux/amd64
    profiles: [x86]
    pull_policy: never
    command: build

  rootfs-x86:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:x86}
    platform: linux/amd64
    profiles: [x86]
    pull_policy: never
    command: rootfs

  test-x86:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:x86}
    platform: linux/amd64
    profiles: [x86]
    pull_policy: never
    tmpfs:
      - /dev/shm:exec,size=512m
    command: test

  dev-x86:
    <<: [*env, *vols, *sec]
    image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:x86}
    platform: linux/amd64
    profiles: [x86]
    pull_policy: never
    tmpfs:
      - /dev/shm:exec,size=512m
    stdin_open: true
    tty: true
    command: bash

volumes:
  kerndbox-cache:
    name: kerndbox-cache
