# kerndbox — docker-compose.yml
#
#   On arm64 host:  docker compose --profile arm64 run --rm {service}-arm64
#   On x86_64 host: docker compose --profile x86   run --rm {service}-x86
#
# By default pulls prebuilt image from ghcr.io/mixos-go/kerndbox.
# To build locally instead:
#   docker compose --profile arm64 build build-arm64
#   KERNDBOX_IMAGE=kerndbox:arm64 docker compose ...

x-base-arm64: &base-arm64
  image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:arm64}
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/arm64
  platform: linux/arm64
  privileged: true
  security_opt:
    - seccomp:unconfined
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

x-base-x86: &base-x86
  image: ${KERNDBOX_IMAGE:-ghcr.io/mixos-go/kerndbox:x86}
  build:
    context: .
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
  platform: linux/amd64
  privileged: true
  security_opt:
    - seccomp:unconfined
  volumes:
    - .:/workspace
    - kerndbox-cache:/cache
  working_dir: /workspace
  environment:
    - GITHUB_REPO=${GITHUB_REPO:-mixos-go/kerndbox}
    - GH_TOKEN=${GH_TOKEN:-}
    - BOOTSTRAP_TAG=${BOOTSTRAP_TAG:-}

x-shm: &shm
  tmpfs:
    - /dev/shm:exec,size=512m

services:

  # ── arm64 ─────────────────────────────────────────────────────────────────
  build-arm64:
    <<: *base-arm64
    profiles: [arm64]
    command: build

  rootfs-arm64:
    <<: *base-arm64
    profiles: [arm64]
    command: rootfs

  test-arm64:
    <<: *base-arm64
    <<: *shm
    profiles: [arm64]
    command: test

  dev-arm64:
    <<: *base-arm64
    <<: *shm
    profiles: [arm64]
    stdin_open: true
    tty: true
    command: bash

  # ── x86_64 ────────────────────────────────────────────────────────────────
  build-x86:
    <<: *base-x86
    profiles: [x86]
    command: build

  rootfs-x86:
    <<: *base-x86
    profiles: [x86]
    command: rootfs

  test-x86:
    <<: *base-x86
    <<: *shm
    profiles: [x86]
    command: test

  dev-x86:
    <<: *base-x86
    <<: *shm
    profiles: [x86]
    stdin_open: true
    tty: true
    command: bash

volumes:
  kerndbox-cache:
    name: kerndbox-cache
