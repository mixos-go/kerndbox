name: Build Rootfs

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/build-debian-image.sh'
      - '.github/workflows/rootfs.yml'
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture (aarch64 | x86_64 | all)"
        required: false
        default: "all"

permissions: {}

concurrency:
  group: rootfs-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Build rootfs ─────────────────────────────────────────────────────────────
  build-rootfs:
    name: Rootfs (${{ matrix.arch }})
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support \
            e2fsprogs

      - name: Build Debian rootfs (${{ matrix.arch }})
        run: |
          chmod +x scripts/build-debian-image.sh
          sudo ./scripts/build-debian-image.sh ${{ matrix.arch }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: output/debian-rootfs-${{ matrix.arch }}.img
          retention-days: 7

  # ── Boot test — uses latest published kernel ─────────────────────────────────
  # Kernel diambil dari release kernel-latest sehingga rootfs CI tidak bergantung
  # pada kernel build yang sedang berjalan.
  boot-test:
    name: Boot test (${{ matrix.arch }})
    needs: build-rootfs
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04
      fail-fast: false

    steps:
      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: ./output

      - name: Download kernel from kernel-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download kernel-latest \
            --repo ${{ github.repository }} \
            --pattern "linux-uml-${{ matrix.arch }}" \
            --dir ./output
          chmod +x output/linux-uml-${{ matrix.arch }}

      - name: Boot UML kernel (new rootfs)
        run: |
          set +e
          echo 'echo DEVBOX_BOOT_OK && poweroff -f' | \
          timeout 90 output/linux-uml-${{ matrix.arch }} \
            ubd0=output/debian-rootfs-${{ matrix.arch }}.img \
            root=/dev/ubda \
            rootfstype=ext4 \
            mem=512M \
            init=/bin/sh \
            con=fd:0,fd:1 \
            ssl=null \
            2>&1 | tee boot.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "=== UML exit code: ${EXIT_CODE} ==="

      - name: Check boot succeeded
        run: |
          if grep -q "DEVBOX_BOOT_OK" boot.log; then
            echo "✅ Boot test PASSED"
          else
            echo "❌ Boot test FAILED — DEVBOX_BOOT_OK not found"
            grep -q "Kernel panic"          boot.log && grep "Kernel panic" boot.log | head -3 || true
            grep -q "VFS: Cannot open root" boot.log && echo "   → Root filesystem mount failed" || true
            grep -q "No init found"         boot.log && echo "   → init=/bin/sh not found"       || true
            exit 1
          fi

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log-rootfs-${{ matrix.arch }}
          path: boot.log
          retention-days: 7

  # ── Publish rootfs → bootstrap-latest ───────────────────────────────────────
  publish-rootfs:
    name: Publish rootfs
    permissions:
      contents: write
    needs: [build-rootfs, boot-test]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download rootfs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rootfs-*
          merge-multiple: true
          path: ./output

      - name: List output
        run: ls -lh output/

      - name: Publish to bootstrap-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILT_AT="$(date '+%Y-%m-%d %H:%M UTC')"

          git push origin :refs/tags/bootstrap-latest 2>/dev/null || true
          gh release create bootstrap-latest \
            --title "Bootstrap (latest) — ${BUILT_AT}" \
            --notes "Debian bookworm rootfs for DevBox.

          **Built:** ${BUILT_AT}
          **Commit:** ${{ github.sha }}

          Files:
          - \`debian-rootfs-aarch64.img\` — ARM64 rootfs (~400MB sparse ext4)
          - \`debian-rootfs-x86_64.img\`  — x86_64 rootfs (~400MB sparse ext4)

          Downloaded by DevBox app on first launch.
          Use directly: \`ubd0=debian-rootfs-aarch64.img\` — no decompression needed.

          > Rolling tag — always points to latest build." \
            --prerelease

          for f in output/debian-rootfs-*.img; do
            gh release upload bootstrap-latest "$f" --clobber
          done
