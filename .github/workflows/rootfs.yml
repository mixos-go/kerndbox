name: Build Rootfs

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/build-debian-image.sh'
      - '.github/workflows/rootfs.yml'
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture (aarch64 | x86_64 | all)"
        required: false
        default: "all"

permissions: {}

concurrency:
  group: rootfs-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-rootfs:
    name: Rootfs (${{ matrix.arch }})
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            e2fsprogs

      - name: Enable binfmt for cross-arch chroot
        run: sudo systemctl restart systemd-binfmt 2>/dev/null || true

      - name: Build Debian rootfs (${{ matrix.arch }})
        run: |
          chmod +x scripts/build-debian-image.sh
          sudo ./scripts/build-debian-image.sh ${{ matrix.arch }}

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: output/debian-rootfs-${{ matrix.arch }}.img
          retention-days: 7

  publish-rootfs:
    name: Publish rootfs
    permissions:
      contents: write
    needs: build-rootfs
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download rootfs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rootfs-*
          merge-multiple: true
          path: ./output

      - name: List output
        run: ls -lh output/

      - name: Publish to bootstrap-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILT_AT="$(date '+%Y-%m-%d %H:%M UTC')"

          git push origin :refs/tags/bootstrap-latest 2>/dev/null || true
          gh release create bootstrap-latest \
            --title "Bootstrap (latest) -- ${BUILT_AT}" \
            --notes "Debian bookworm rootfs for DevBox.

          **Built:** ${BUILT_AT}
          **Commit:** ${{ github.sha }}

          Files:
          - \`debian-rootfs-aarch64.img\` -- ARM64 rootfs
          - \`debian-rootfs-x86_64.img\`  -- x86_64 rootfs

          > Rolling tag -- always points to latest build." \
            --prerelease

          for f in output/debian-rootfs-*.img; do
            gh release upload bootstrap-latest "$f" --clobber
          done
