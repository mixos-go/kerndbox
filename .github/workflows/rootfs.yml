name: Build Rootfs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v1.0.0"
        required: true
        default: "v0.1.0"
      label:
        description: "Release label"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - experimental
      arch:
        description: "Architecture to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - arm64
          - x86_64
      kernel_tag:
        description: "Kernel release tag to pull modules from (e.g. kernel-v1.0.0)"
        required: true
        default: "kernel-v0.1.0"

permissions: {}

concurrency:
  group: rootfs-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:

  setup:
    name: Setup matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: matrix
        run: |
          case "${{ github.event.inputs.arch }}" in
            all)   echo 'matrix={"include":[{"arch":"aarch64","arch_out":"arm64","runner":"ubuntu-24.04-arm"},{"arch":"x86_64","arch_out":"x86_64","runner":"ubuntu-24.04"}]}' >> $GITHUB_OUTPUT ;;
            arm64) echo 'matrix={"include":[{"arch":"aarch64","arch_out":"arm64","runner":"ubuntu-24.04-arm"}]}' >> $GITHUB_OUTPUT ;;
            *)     echo 'matrix={"include":[{"arch":"x86_64","arch_out":"x86_64","runner":"ubuntu-24.04"}]}' >> $GITHUB_OUTPUT ;;
          esac

  build-rootfs:
    name: Rootfs (${{ matrix.arch_out }})
    needs: setup
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:bookworm
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support e2fsprogs

      - name: Enable binfmt for cross-arch chroot
        run: systemctl restart systemd-binfmt 2>/dev/null || true

      - name: Download modules from ${{ github.event.inputs.kernel_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p output
          KERNEL_TAG="${{ github.event.inputs.kernel_tag }}"
          ARCH_OUT="${{ matrix.arch_out }}"

          echo "Fetching modules-${ARCH_OUT}.tar.gz from ${KERNEL_TAG}..."
          if gh release download "${KERNEL_TAG}" \
              --repo ${{ github.repository }} \
              --pattern "modules-${ARCH_OUT}.tar.gz" \
              --dir ./output; then
            KO_COUNT=$(tar -tzf output/modules-${ARCH_OUT}.tar.gz | grep -c '\.ko$' || true)
            echo "  → ${KO_COUNT} .ko modules"
            echo "MODULES_TAR=$(pwd)/output/modules-${ARCH_OUT}.tar.gz" >> "$GITHUB_ENV"
          else
            echo "WARNING: modules-${ARCH_OUT}.tar.gz not found in ${KERNEL_TAG}"
            echo "  Rootfs will have empty /lib/modules/ - run kernel workflow first"
            echo "MODULES_TAR=" >> "$GITHUB_ENV"
          fi

      - name: Build Debian rootfs (${{ matrix.arch_out }}) with modules
        run: |
          chmod +x scripts/build-debian-image.sh
          ARCH_UPPER=$(echo "${{ matrix.arch }}" | tr '[:lower:]' '[:upper:]' | tr - _)
          env "MODULES_TAR_${ARCH_UPPER}=${MODULES_TAR}" \
            ./scripts/build-debian-image.sh ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch_out }}
          path: output/debian-rootfs-${{ matrix.arch }}.img
          retention-days: 7

  publish-rootfs:
    name: Publish rootfs
    needs: [setup, build-rootfs]
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rootfs-*
          merge-multiple: true
          path: ./output

      - name: Create tag
        run: |
          TAG="bootstrap-${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

      - name: Publish rootfs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootstrap-${{ github.event.inputs.version }}
          name: Debian Rootfs - ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.label == 'experimental' }}
          generate_release_notes: true
          body: |
            Debian bookworm rootfs for kerndbox/DevBox.

            **Version:** ${{ github.event.inputs.version }}
            **Label:** ${{ github.event.inputs.label }}
            **Kernel tag:** ${{ github.event.inputs.kernel_tag }}
            **Arch:** ${{ github.event.inputs.arch }}

            Files:
            - debian-rootfs-aarch64.img — Debian rootfs for ARM64
            - debian-rootfs-x86_64.img — Debian rootfs for x86_64

            Kernel modules baked in. modprobe works out of the box.
          files: |
            output/debian-rootfs-aarch64.img
            output/debian-rootfs-x86_64.img
          token: ${{ secrets.GITHUB_TOKEN }}

