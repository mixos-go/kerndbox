name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v1.0.0"
        required: true
        default: "v0.1.0"
      label:
        description: "Release label"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - experimental
      arch:
        description: "Architecture to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - arm64
          - x86_64

permissions: {}

concurrency:
  group: kernel-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:

  setup:
    name: Setup matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: matrix
        run: |
          case "${{ github.event.inputs.arch }}" in
            all)   echo 'matrix={"include":[{"arch":"aarch64","arch_out":"arm64","runner":"ubuntu-24.04-arm"},{"arch":"x86_64","arch_out":"x86_64","runner":"ubuntu-24.04"}]}' >> $GITHUB_OUTPUT ;;
            arm64) echo 'matrix={"include":[{"arch":"aarch64","arch_out":"arm64","runner":"ubuntu-24.04-arm"}]}' >> $GITHUB_OUTPUT ;;
            *)     echo 'matrix={"include":[{"arch":"x86_64","arch_out":"x86_64","runner":"ubuntu-24.04"}]}' >> $GITHUB_OUTPUT ;;
          esac

  build-kernel:
    name: Kernel (${{ matrix.arch_out }})
    needs: setup
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential flex bison libssl-dev libelf-dev bc

      - name: Build UML kernel (${{ matrix.arch_out }})
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            chmod +x scripts/build-arm64.sh && sudo ./scripts/build-arm64.sh
          else
            chmod +x scripts/build-x86.sh && sudo ./scripts/build-x86.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch_out }}
          path: |
            output/kernel-${{ matrix.arch_out }}
            output/modules-${{ matrix.arch_out }}.tar.gz
          retention-days: 7

  publish-kernel:
    name: Publish kernel
    needs: [setup, build-kernel]
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-*
          merge-multiple: true
          path: ./output

      - name: Read kernel source version
        id: kver
        run: |
          VER=$(grep 'UML_KERNEL_VERSION:-' scripts/build-arm64.sh \
            | head -1 | sed 's/.*:-\(.*\)}/\1/')
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          LABEL="${{ github.event.inputs.label }}"
          ARCH="${{ github.event.inputs.arch }}"
          KVER="${{ steps.kver.outputs.version }}"
          BUILT_AT="$(date '+%Y-%m-%d %H:%M UTC')"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="$(echo "$SHORT_SHA" | cut -c1-7)"
          REPO="${{ github.repository }}"
          TAG="kernel-${VERSION}"

          LABEL_BADGE=""
          if [ "$LABEL" = "latest" ]; then
            LABEL_BADGE='![latest](https://img.shields.io/badge/label-latest-brightgreen)'
          elif [ "$LABEL" = "experimental" ]; then
            LABEL_BADGE='![experimental](https://img.shields.io/badge/label-experimental-orange)'
          fi

          FILES_TABLE=""
          [ -f output/kernel-arm64          ] && FILES_TABLE="${FILES_TABLE}\n| \`kernel-arm64\`          | UML kernel binary | ARM64  | $(du -sh output/kernel-arm64 | cut -f1) |"
          [ -f output/kernel-x86_64         ] && FILES_TABLE="${FILES_TABLE}\n| \`kernel-x86_64\`         | UML kernel binary | x86_64 | $(du -sh output/kernel-x86_64 | cut -f1) |"
          [ -f output/modules-arm64.tar.gz  ] && FILES_TABLE="${FILES_TABLE}\n| \`modules-arm64.tar.gz\`  | Kernel modules    | ARM64  | $(du -sh output/modules-arm64.tar.gz | cut -f1) |"
          [ -f output/modules-x86_64.tar.gz ] && FILES_TABLE="${FILES_TABLE}\n| \`modules-x86_64.tar.gz\` | Kernel modules    | x86_64 | $(du -sh output/modules-x86_64.tar.gz | cut -f1) |"

          cat > /tmp/release-notes.md << NOTES
          # kerndbox Kernel ${VERSION}

          ${LABEL_BADGE}

          User Mode Linux kernel for **DevBox** — runs Linux in userspace via \`ptrace\`, no KVM, no root required.

          ---

          ## 📦 Build Info

          | Field       | Value |
          |---|---|
          | **Version** | \`${VERSION}\` |
          | **Label**   | \`${LABEL}\` |
          | **Linux**   | \`${KVER}\` |
          | **Arch**    | \`${ARCH}\` |
          | **Commit**  | [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${{ github.sha }}) |
          | **Built**   | \`${BUILT_AT}\` |

          ---

          ## 📁 Files

          | File | Description | Arch | Size |
          |---|---|---|---|
          $(echo -e "$FILES_TABLE" | sed '/^$/d')

          ---

          ## 🚀 Usage

          ### Download
          \`\`\`bash
          # Kernel binary only
          gh release download ${TAG} --repo ${REPO} --pattern "kernel-arm64"

          # Kernel + modules
          gh release download ${TAG} --repo ${REPO} \
            --pattern "kernel-arm64" \
            --pattern "modules-arm64.tar.gz"
          \`\`\`

          ### Boot
          \`\`\`bash
          chmod +x kernel-arm64
          ./kernel-arm64 ubd0=rootfs.img root=/dev/ubda mem=512M con=fd:0,fd:1
          \`\`\`
          NOTES

          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT
          echo "tag=kernel-${VERSION}"            >> $GITHUB_OUTPUT

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.notes.outputs.tag }}"
          LABEL="${{ github.event.inputs.label }}"

          # --latest     → GitHub marks this as the latest stable release
          # --prerelease → shown as pre-release, does NOT become latest
          RELEASE_FLAG="--prerelease"
          [ "$LABEL" = "latest" ] && RELEASE_FLAG="--latest"

          gh release create "$TAG" \
            --title "Kernel ${{ github.event.inputs.version }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            $RELEASE_FLAG \
            2>/dev/null || \
          gh release edit "$TAG" \
            --title "Kernel ${{ github.event.inputs.version }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            $RELEASE_FLAG

          for f in output/kernel-* output/modules-*.tar.gz; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber
          done

          echo "✓ Published: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
