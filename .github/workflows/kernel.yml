name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v1.0.0"
        required: true
        default: "v0.1.0"
      label:
        description: "Release label"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - experimental
      arch:
        description: "Architecture to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - arm64
          - x86_64

permissions: {}

concurrency:
  group: kernel-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:

  setup:
    name: Setup matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Compute build matrix
        id: matrix
        run: |
          case "${{ github.event.inputs.arch }}" in
            all)   echo 'matrix={"include":[{"arch":"aarch64","arch_out":"arm64","runner":"ubuntu-24.04-arm"},{"arch":"x86_64","arch_out":"x86_64","runner":"ubuntu-24.04"}]}' >> $GITHUB_OUTPUT ;;
            arm64) echo 'matrix={"include":[{"arch":"aarch64","arch_out":"arm64","runner":"ubuntu-24.04-arm"}]}' >> $GITHUB_OUTPUT ;;
            *)     echo 'matrix={"include":[{"arch":"x86_64","arch_out":"x86_64","runner":"ubuntu-24.04"}]}' >> $GITHUB_OUTPUT ;;
          esac

  build-kernel:
    name: Kernel (${{ matrix.arch_out }})
    needs: setup
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential flex bison libssl-dev libelf-dev bc

      - name: Build UML kernel (${{ matrix.arch_out }})
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            chmod +x scripts/build-arm64.sh && sudo ./scripts/build-arm64.sh
          else
            chmod +x scripts/build-x86.sh && sudo ./scripts/build-x86.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch_out }}
          path: |
            output/kernel-${{ matrix.arch_out }}
            output/modules-${{ matrix.arch_out }}.tar.gz
          retention-days: 7

  publish-kernel:
    name: Publish kernel
    needs: [setup, build-kernel]
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-*
          merge-multiple: true
          path: ./output

      - name: Read kernel source version
        id: kver
        run: |
          VER=$(grep 'UML_KERNEL_VERSION:-' scripts/build-arm64.sh \
            | head -1 | sed 's/.*:-\(.*\)}/\1/')
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          TAG="kernel-${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-${{ github.event.inputs.version }}
          name: UML Kernel ${{ steps.kver.outputs.version }} - ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.label == 'experimental' }}
          generate_release_notes: true
          body: |
            UML kernel build for kerndbox/DevBox.

            **Kernel:** Linux ${{ steps.kver.outputs.version }}
            **Version:** ${{ github.event.inputs.version }}
            **Label:** ${{ github.event.inputs.label }}
            **Built:** ${{ github.event.inputs.arch }}

            Files:
            - kernel-arm64 — UML kernel binary for ARM64
            - kernel-x86_64 — UML kernel binary for x86_64
            - modules-arm64.tar.gz — Kernel modules ARM64
            - modules-x86_64.tar.gz — Kernel modules x86_64

            No KVM needed. No root needed. Runs entirely in userspace via ptrace.
          files: |
            output/kernel-arm64
            output/kernel-x86_64
            output/modules-arm64.tar.gz
            output/modules-x86_64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

