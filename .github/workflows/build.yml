name: Build DevBox

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/build-debian-image.sh'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture (aarch64 | x86_64 | all)"
        required: false
        default: "all"
      target:
        description: "What to build (rootfs | kernel | all)"
        required: false
        default: "all"
      kconfig:
        description: "Kernel config profile (defconfig | maxconfig)"
        required: false
        default: "defconfig"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# ── Matrix config ────────────────────────────────────────────────────────────
# UML cannot be cross-compiled — ARCH=um always targets the host CPU's ABI.
# Each arch must be built natively on its own runner.
#
#   aarch64 → ubuntu-24.04-arm  (GitHub-hosted ARM64)
#   x86_64  → ubuntu-24.04      (GitHub-hosted x86_64)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Build rootfs ────────────────────────────────────────────────────────────
  build-rootfs:
    name: Rootfs (${{ matrix.arch }})
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap qemu-user-static binfmt-support \
            libguestfs-tools qemu-utils

      - name: Build Debian rootfs (${{ matrix.arch }})
        run: |
          chmod +x scripts/build-debian-image.sh
          sudo ./scripts/build-debian-image.sh ${{ matrix.arch }} --rootfs-only

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: output/debian-rootfs-${{ matrix.arch }}.img
          retention-days: 3

  # ── Build kernel ────────────────────────────────────────────────────────────
  build-kernel:
    name: Kernel (${{ matrix.arch }})
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            bc \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            libguestfs-tools \
            qemu-utils

      - name: Build UML kernel (${{ matrix.arch }})
        env:
          KCONFIG_PROFILE: ${{ github.event.inputs.kconfig || 'defconfig' }}
        run: |
          chmod +x scripts/build-debian-image.sh
          sudo KCONFIG_PROFILE=$KCONFIG_PROFILE \
            ./scripts/build-debian-image.sh ${{ matrix.arch }} --kernel-only

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: output/linux-uml-${{ matrix.arch }}
          retention-days: 3


  # ── Boot test ────────────────────────────────────────────────────────────────
  # Boots the freshly-built UML kernel against the actual Debian rootfs.
  # Uses init=/bin/sh to skip systemd and get fast deterministic boot.
  # Passes only if UML reaches userspace and prints DEVBOX_BOOT_OK.
  boot-test:
    name: Boot test (${{ matrix.arch }})
    needs: [build-kernel, build-rootfs]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04
      fail-fast: false

    steps:
      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: ./output

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          path: ./output

      - name: Boot UML kernel (Debian rootfs)
        run: |
          chmod +x output/linux-uml-${{ matrix.arch }}

          # Boot with init=/bin/sh — skips systemd, drops straight to shell.
          # We pipe a script to stdin: print marker, then poweroff.
          # Timeout 90s to allow UML + Debian kernel init to fully start.
          set +e
          echo 'echo DEVBOX_BOOT_OK && poweroff -f' | \
          timeout 90 output/linux-uml-${{ matrix.arch }} \
            ubd0=output/debian-rootfs-${{ matrix.arch }}.img \
            root=/dev/ubda \
            rootfstype=ext4 \
            mem=512M \
            init=/bin/sh \
            con=fd:0,fd:1 \
            ssl=null \
            2>&1 | tee boot.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "=== UML exit code: ${EXIT_CODE} ==="

      - name: Check boot succeeded
        run: |
          echo "=== Boot log ==="
          cat boot.log
          echo ""

          if grep -q "DEVBOX_BOOT_OK" boot.log; then
            echo "✅ Boot test PASSED — Debian rootfs reached userspace"
          else
            echo "❌ Boot test FAILED — DEVBOX_BOOT_OK not found in boot log"
            echo ""
            if grep -q "Kernel panic" boot.log; then
              echo "   → Kernel panic:"
              grep "Kernel panic" boot.log | head -5
            fi
            if grep -q "VFS: Cannot open root" boot.log; then
              echo "   → Root filesystem mount failed (check UBD / ext4)"
            fi
            if grep -q "No init found" boot.log; then
              echo "   → init=/bin/sh not found in rootfs"
            fi
            exit 1
          fi

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log-${{ matrix.arch }}
          path: boot.log
          retention-days: 7

  # ── Publish rootfs → bootstrap-YYYY-MM-DD ──────────────────────────────────
  publish-rootfs:
    name: Publish rootfs
    permissions:
      contents: write
    needs: [build-rootfs, boot-test]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download rootfs artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rootfs-*
          merge-multiple: true
          path: ./output

      - name: List output
        run: ls -lh output/

      - name: Publish to bootstrap-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILT_AT="$(date '+%Y-%m-%d %H:%M UTC')"
          DATE_TAG="bootstrap-$(date '+%Y-%m-%d')"

          # Update rolling bootstrap-latest tag
          git push origin :refs/tags/bootstrap-latest 2>/dev/null || true
          gh release create bootstrap-latest \
            --title "Bootstrap (latest) — ${BUILT_AT}" \
            --notes "Debian bookworm rootfs for DevBox.

          **Built:** ${BUILT_AT}
          **Commit:** ${{ github.sha }}

          Files:
          - \`debian-rootfs-aarch64.img\` — ARM64 rootfs (~400MB sparse ext4)
          - \`debian-rootfs-x86_64.img\`  — x86_64 rootfs (~400MB sparse ext4)

          Downloaded by DevBox app on first launch.
          Use directly: \`ubd0=debian-rootfs-aarch64.img\` — no decompression needed.

          > Rolling tag — always points to latest build." \
            --prerelease

          for f in output/debian-rootfs-*.img; do
            gh release upload bootstrap-latest "$f" --clobber
          done

  # ── Publish kernel → kernel-vX.Y.Z ─────────────────────────────────────────
  publish-kernel:
    name: Publish kernel
    permissions:
      contents: write
    needs: [build-kernel, boot-test]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download kernel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-*
          merge-multiple: true
          path: ./output

      - name: List output
        run: ls -lh output/

      - name: Read kernel version
        id: kver
        run: |
          # Extract version from binary if available, else from build script
          VER=$(grep 'KERNEL_VERSION=' scripts/build-debian-image.sh | head -1 | cut -d= -f2 | tr -d '"')
          echo "version=${VER}" >> $GITHUB_OUTPUT

      - name: Publish to kernel-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILT_AT="$(date '+%Y-%m-%d %H:%M UTC')"
          KVER="${{ steps.kver.outputs.version }}"

          git push origin :refs/tags/kernel-latest 2>/dev/null || true
          gh release create kernel-latest \
            --title "UML Kernel ${KVER} (latest) — ${BUILT_AT}" \
            --notes "User Mode Linux kernel for DevBox.

          **Kernel:** Linux ${KVER}
          **Built:** ${BUILT_AT}
          **Commit:** ${{ github.sha }}

          Files:
          - \`linux-uml-aarch64\` — UML kernel binary for ARM64 Android
          - \`linux-uml-x86_64\`  — UML kernel binary for x86_64

          Bundled inside DevBox APK (assets/). Extracted on first launch.
          No KVM needed. No root needed. Runs entirely in userspace via ptrace.

          > Rolling tag — always points to latest build." \
            --prerelease

          for f in output/linux-uml-*; do
            gh release upload kernel-latest "$f" --clobber
          done
