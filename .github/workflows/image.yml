name: Build & Push Dev Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/entrypoint.sh
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & push (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag_suffix: arm64
          - platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: x86

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.tag_suffix }}
            ghcr.io/${{ github.repository }}:${{ matrix.tag_suffix }}-${{ github.sha }}

  # Combine arm64 + x86 into a multi-arch manifest under :latest
  manifest:
    name: Push multi-arch manifest
    needs: build-push
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create \
            ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:arm64 \
            ghcr.io/${{ github.repository }}:x86
          docker manifest push ghcr.io/${{ github.repository }}:latest
